name: Desplegar Vite a GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar el código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Actualizado para evitar la advertencia

      - name: 3. Instalar dependencias
        run: npm install

      - name: 4. Construir el proyecto Vite
        run: npm run build

      - name: 5. Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: 6. Subir la carpeta dist
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Corregido: Vite usa la carpeta dist

      - name: 7. Desplegar en producción
        id: deployment
        uses: actions/deploy-pages@v4